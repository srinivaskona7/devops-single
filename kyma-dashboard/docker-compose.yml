services:
  backend:
    image: sriniv7654/kyma-dashboard-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kyma-manager-backend
    ports:
      - "8100:8100"   # REST API
      - "9464:9464"   # Prometheus metrics
    environment:
      NODE_ENV:        production
      PORT:            "8100"
      SESSION_SECRET:  ${SESSION_SECRET:-a-very-long-secret-key-that-is-at-least-32-characters}
      KUBECONFIG:      /kubeconfig/config.yaml
      GEN_DIR:         /app/generated
      OTEL_ENABLED:    ${OTEL_ENABLED:-false}
    volumes:
      - ${KUBECONFIG_PATH:-../generated/kubeconfig-token.yaml}:/kubeconfig/config.yaml:ro
      - ../generated:/app/generated:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: sriniv7654/kyma-dashboard-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kyma-manager-frontend
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: kyma-manager-backend:8100
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Optional observability stack ─────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    profiles: [observability]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../.docker/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"   # OTLP/HTTP receiver
      - "8888:8888"   # Internal metrics
    depends_on: [backend]

  prometheus:
    image: prom/prometheus:v2.54.0
    profiles: [observability]
    volumes:
      - ../.docker/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [observability]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ../.docker/grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on: [prometheus]
