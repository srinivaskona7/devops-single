server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Proxy all /api, /auth, /run, /ws calls to backend
    # BACKEND_URL is substituted at container startup via docker-entrypoint.sh
    # Local (docker-compose): BACKEND_URL=kyma-manager-backend:8100
    # Kubernetes:             BACKEND_URL=kyma-dashboard-backend:8100 (from ConfigMap)
    location ~ ^/(api|auth|run|ws)/ {
        proxy_pass         http://${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;        # Required for SSE streaming
        proxy_cache        off;
        proxy_read_timeout 3600s;     # Long timeout for SSE/exec
    }

    # React SPA — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
